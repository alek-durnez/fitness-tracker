<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KrachtLog</title>
<style>
  :root {  
    --graphite:#1A1A1C; --iron:#26262A; --border:#36363B;  
    --chalk:#EDEAE2; --steel:#9A9CA0; --rust:#C1440E; --brass:#C9A227;  
  }  
  * { box-sizing: border-box; }  
  body {  
    margin: 0; background: var(--graphite); color: var(--chalk);  
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;  
  }  
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }  
  .display { text-transform: uppercase; font-weight: 700; letter-spacing: 0.03em; }  
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 16px; }  
  header { position: sticky; top: 0; z-index: 10; background: var(--graphite); border-bottom: 1px solid var(--border); }  
  .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 14px 0; }  
  .brand { display: flex; align-items: center; gap: 10px; }  
  .brand-icon { width: 26px; height: 26px; flex-shrink: 0; }  
  .brand h1 { font-size: 20px; margin: 0; }  
  nav { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }  
  .tab-btn {  
    padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;  
    border: 1px solid var(--border); background: transparent; color: var(--steel); cursor: pointer;  
  }  
  .tab-btn.active { background: var(--rust); border-color: var(--rust); color: var(--chalk); }  
  main { padding: 20px 0 60px; }  
  .card { background: var(--iron); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 18px; }  
  .flex { display: flex; }  
  .between { justify-content: space-between; }  
  .center-v { align-items: center; }  
  .wrap-gap { flex-wrap: wrap; gap: 12px; }  
  .stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 18px; }  
  @media (min-width: 640px) { .stat-grid { grid-template-columns: repeat(4,1fr); } }  
  .stat-card { background: var(--iron); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }  
  .stat-label { font-size: 11px; color: var(--steel); text-transform: uppercase; letter-spacing: 0.05em; }  
  .stat-value { font-size: 24px; font-weight: 600; margin-top: 4px; }  
  .section-title { font-size: 16px; font-weight: 600; margin: 0 0 12px; text-transform: uppercase; letter-spacing: 0.03em; }  
  input, select, textarea {  
    background: var(--graphite); border: 1px solid var(--border); border-radius: 6px;  
    padding: 8px 10px; color: var(--chalk); font-size: 14px; width: 100%; font-family: inherit;  
  }  
  input:focus, select:focus, textarea:focus, button:focus { outline: 2px solid var(--rust); outline-offset: 1px; }  
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }  
  .field-label { font-size: 11px; color: var(--steel); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }  
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }  
  .btn-primary {  
    background: var(--rust); color: var(--chalk); border: none; border-radius: 6px;  
    padding: 10px 16px; font-weight: 600; font-size: 14px; cursor: pointer;  
    display: inline-flex; align-items: center; gap: 6px;  
  }  
  .btn-secondary {  
    background: transparent; border: 1px solid var(--border); color: var(--steel);  
    border-radius: 6px; padding: 8px 12px; cursor: pointer; font-size: 13px;  
  }  
  .btn-danger { background: var(--rust); color: var(--chalk); border: none; border-radius: 6px; padding: 10px 16px; font-weight:600; font-size: 14px; cursor: pointer; margin-top: 8px; }  
  .icon-btn { background: transparent; border: none; color: var(--steel); cursor: pointer; padding: 4px; flex-shrink: 0; }  
  .error-text { color: var(--rust); font-size: 13px; margin-bottom: 10px; }  
  .empty { color: var(--steel); font-size: 14px; padding: 20px; text-align: center; }  
  .history-group { background: var(--iron); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }  
  .history-head { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }  
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }  
  .history-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }  
  .history-row:last-child { border-bottom: none; }  
  .pr-badge { font-size: 10px; font-weight: 700; color: var(--graphite); background: var(--brass); border-radius: 4px; padding: 1px 6px; letter-spacing: 0.04em; }  
  .notes { font-size: 12px; color: var(--steel); margin-top: 4px; font-style: italic; }  
  .cloud-bar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; font-size: 12px; border-radius: 6px; margin-bottom: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }  
  .cloud-log { font-family: ui-monospace, monospace; font-size: 11px; background: #111; color: #ff8888; border: 1px solid var(--rust); padding: 8px; border-radius: 4px; margin-top: 8px; display: none; white-space: pre-wrap; word-break: break-all; }  
  .toast {  
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);  
    background: var(--iron); border: 1px solid var(--brass); padding: 10px 18px;  
    border-radius: 8px; font-size: 13px; z-index: 50;  
  }  
  .chart-svg { width: 100%; height: 240px; }  
  .search-wrap { position: relative; flex: 1; min-width: 160px; }  
  .search-wrap input { padding-left: 30px; }  
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--steel); }  
</style>
</head>
<body>
<div id="app"></div>

<script>
(function () {
  "use strict";

  var LOCAL_BACKUP_KEY = "krachtlog-local-fallback";
  var ROUTINE_COLORS = { "Push": "#C1440E", "Pull A": "#C9A227", "Pull B": "#5C7A8A", "Legs": "#6B7A4A" };
  var FALLBACK_PALETTE = ["#8B6F9E", "#9E6F6F", "#6F9E8B", "#9E9E6F"];

  function routineColor(r) {
    if (ROUTINE_COLORS[r]) return ROUTINE_COLORS[r];
    var hash = 0;
    for (var i = 0; i < r.length; i++) hash = (hash * 31 + r.charCodeAt(i)) % FALLBACK_PALETTE.length;
    return FALLBACK_PALETTE[Math.abs(hash) % FALLBACK_PALETTE.length];
  }

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // --- State ---
  var config = { user: "", repo: "", token: "" };
  var entries = [];
  var fileSha = null;
  var cloudState = "unconfigured"; 
  var cloudErrorLog = "";
  var tab = "overzicht";
  
  var confirmDeleteId = null;
  var filterRoutine = "all";
  var search = "";
  var selectedExercise = "";
  
  var lastDate = todayISO();
  var lastRoutine = "";
  var toastMsg = "";
  var toastTimer = null;

  function todayISO() {
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  // Config lader
  function loadAllFromStorage() {
    try {
      var savedConfig = localStorage.getItem("krachtlog-config-v2");
      if (savedConfig) config = JSON.parse(savedConfig);
      var savedLocal = localStorage.getItem(LOCAL_BACKUP_KEY);
      if (savedLocal) entries = JSON.parse(savedLocal);
    } catch(e) {}
  }
  loadAllFromStorage();

  function saveConfig() {
    try { localStorage.setItem("krachtlog-config-v2", JSON.stringify(config)); } catch(e) {}
  }
  function saveLocalFallback() {
    try { localStorage.setItem(LOCAL_BACKUP_KEY, JSON.stringify(entries)); } catch(e) {}
  }

  // --- API Engine ---
  async function apiRequest(method, body) {
    var tokenClean = config.token.trim();
    // Forceer 'token ' prefix als de gebruiker die er per ongeluk niet voor heeft gezet
    var authHeader = tokenClean.startsWith("ghp_") ? "token " + tokenClean : tokenClean;
    
    var url = "https://api.github.com/repos/" + config.user.trim() + "/" + config.repo.trim() + "/contents/gym-data.json";
    var headers = {
      "Authorization": authHeader,
      "Accept": "application/vnd.github.v3+json",
      "Content-Type": "application/json"
    };
    var options = { method: method, headers: headers, cache: "no-store" };
    if (body) options.body = JSON.stringify(body);
    return fetch(url, options);
  }

  async function syncFromCloud() {
    if (!config.user || !config.repo || !config.token) {
      cloudState = "unconfigured";
      render();
      return;
    }
    cloudState = "loading";
    cloudErrorLog = "";
    render();

    try {
      var res = await apiRequest("GET");
      if (res.status === 404) {
        cloudErrorLog = "gym-data.json niet gevonden. Poging tot aanmaken...";
        render();
        var createRes = await apiRequest("PUT", {
          message: "Initialiseer logboek",
          content: btoa(JSON.stringify(entries, null, 2))
        });
        if (createRes.ok) {
          var data = await createRes.json();
          fileSha = data.content.sha;
          cloudState = "synced";
          cloudErrorLog = "";
        } else {
          var errData = await createRes.json();
          throw new Error("Aanmaken mislukt (" + createRes.status + "): " + errData.message);
        }
      } else if (res.ok) {
        var data = await res.json();
        fileSha = data.sha;
        var rawContent = atob(data.content.replace(/\s/g, ''));
        entries = JSON.parse(rawContent);
        saveLocalFallback();
        cloudState = "synced";
        cloudErrorLog = "";
      } else {
        var errData = await res.json();
        throw new Error("GitHub Fout (Status " + res.status + "): " + (errData.message || "Onbekend"));
      }
    } catch(err) {
      cloudState = "error";
      cloudErrorLog = err.message;
    }
    render();
  }

  async function pushToCloud(updatedEntries) {
    if (cloudState !== "synced" && cloudState !== "error") return;
    try {
      var body = {
        message: "Update logboek: " + todayISO(),
        content: btoa(JSON.stringify(updatedEntries, null, 2)),
        sha: fileSha
      };
      var res = await apiRequest("PUT", body);
      if (res.ok) {
        var data = await res.json();
        fileSha = data.content.sha;
        entries = updatedEntries;
        saveLocalFallback();
        cloudState = "synced";
        cloudErrorLog = "";
      } else {
        var errData = await res.json();
        throw new Error("Push mislukt (" + res.status + "): " + errData.message);
      }
    } catch (err) {
      cloudState = "error";
      cloudErrorLog = err.message;
      entries = updatedEntries;
      saveLocalFallback();
    }
    render();
  }

  // --- Analytics ---
  function computeAnalytics(list) {
    var byExercise = {};
    list.forEach(function (e) { (byExercise[e.exercise] = byExercise[e.exercise] || []).push(e); });
    var prKeys = {}; var dailyMaxMap = {}; var exerciseSeries = {};
    Object.keys(byExercise).forEach(function (ex) {
      var byDate = {};
      byExercise[ex].forEach(function (e) { byDate[e.date] = Math.max(byDate[e.date] || 0, e.weight); });
      var dates = Object.keys(byDate).sort();
      var runningMax = -Infinity; var series = [];
      dates.forEach(function (d, i) {
        var w = byDate[d];
        var isPR = i === 0 || w > runningMax;
        if (isPR) prKeys[ex + "|" + d] = true;
        dailyMaxMap[ex + "|" + d] = w;
        series.push({ date: d, weight: w, isPR: isPR });
        runningMax = Math.max(runningMax, w);
      });
      exerciseSeries[ex] = series;
    });
    return { prKeys: prKeys, dailyMaxMap: dailyMaxMap, exerciseSeries: exerciseSeries };
  }

  function formatDateNL(iso, opts) {
    if(!iso) return "";
    var d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("nl-NL", opts || { day: "numeric", month: "long", year: "numeric" });
  }
  function formatDateShort(iso) {
    var d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("nl-NL", { day: "numeric", month: "short" });
  }
  function uniqueSorted(arr) {
    var seen = {}; var out = [];
    arr.forEach(function (v) { if (!seen[v]) { seen[v] = true; out.push(v); } });
    return out.sort();
  }

  function showToast(msg) {
    toastMsg = msg;
    var el = document.getElementById("toast");
    if (el) { el.textContent = msg; el.style.display = "block"; }
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toastMsg = ""; var t = document.getElementById("toast"); if (t) t.style.display = "none";
    }, 2200);
  }

  var ICON_DUMBBELL = '<svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="#C1440E" stroke-width="2"><path d="M6.5 6.5 17.5 17.5M4 4l2.5 2.5M17.5 17.5 20 20"/><rect x="2" y="2" width="4" height="4" rx="1"/><rect x="18" y="18" width="4" height="4" rx="1"/></svg>';
  var ICON_GEAR = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';
  var ICON_TROPHY = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M7 5H4a3 3 0 0 0 3 4M17 5h3a3 3 0 0 1-3 4"/></svg>';
  var ICON_TRASH = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>';
  var ICON_SEARCH = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9A9CA0" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>';

  function buildChartSVG(series) {
    if (!series || series.length === 0) return '<div class="empty">Geen progressiedata.</div>';
    var w = 600, h = 220, padL = 36, padR = 10, padT = 14, padB = 24;
    var weights = series.map(function (s) { return s.weight; });
    var minW = Math.min.apply(null, weights), maxW = Math.max.apply(null, weights);
    var range = (maxW - minW) || 1;
    var stepX = series.length > 1 ? (w - padL - padR) / (series.length - 1) : 0;
    function x(i) { return padL + i * stepX; }
    function y(val) { return h - padB - ((val - minW) / range) * (h - padT - padB); }
    var points = series.map(function (s, i) { return x(i) + "," + y(s.weight); }).join(" ");
    var dots = series.map(function (s, i) {
      return '<circle cx="' + x(i) + '" cy="' + y(s.weight) + '" r="' + (s.isPR ? 6 : 4) + '" fill="' + (s.isPR ? "#C9A227" : "#C1440E") + '" stroke="#1A1A1C" stroke-width="2"/>';
    }).join("");
    var showAll = series.length <= 6;
    var labels = series.map(function (s, i) {
      if (showAll || i === 0 || i === series.length - 1) {
        return '<text x="' + x(i) + '" y="' + (h - 6) + '" font-size="10" fill="#9A9CA0" text-anchor="middle">' + esc(formatDateShort(s.date)) + "</text>";
      }
      return "";
    }).join("");
    return '<svg viewBox="0 0 ' + w + " " + h + '" class="chart-svg">' +
      '<line x1="' + padL + '" y1="' + (h - padB) + '" x2="' + (w - padR) + '" y2="' + (h - padB) + '" stroke="#36363B" />' +
      '<polyline points="' + points + '" fill="none" stroke="#C1440E" stroke-width="2" />' +
      dots + labels + "</svg>";
  }

  function renderCloudStatus() {
    var color = "var(--steel)", txt = "Niet geconfigureerd";
    var displayLog = "none";
    if (cloudState === "loading") { color = "var(--brass)"; txt = "🔄 Laden uit GitHub Cloud..."; }
    else if (cloudState === "synced") { color = "#4A7A5C"; txt = "☁️ Gesynchroniseerd met GitHub"; }
    else if (cloudState === "error") { color = "var(--rust)"; txt = "⚠️ GitHub Verbindingsfout"; displayLog = "block"; }

    var html = '<div class="cloud-bar"><span style="width:8px;height:8px;border-radius:50%;background:' + color + ';"></span><span>' + txt + '</span></div>';
    html += '<div class="cloud-log" id="error-console" style="display:' + displayLog + ';">' + esc(cloudErrorLog) + '</div>';
    return html;
  }

  function render() {
    var analytics = computeAnalytics(entries);
    var exerciseNames = uniqueSorted(entries.map(function (e) { return e.exercise; }));
    if (!selectedExercise || exerciseNames.indexOf(selectedExercise) === -1) selectedExercise = exerciseNames[0] || "";

    var html = '<div class="toast" id="toast" style="display:' + (toastMsg ? "block" : "none") + ';">' + esc(toastMsg) + "</div>";
    html += '<header><div class="wrap header-inner">';
    html += '<div class="brand">' + ICON_DUMBBELL + '<h1>KrachtLog</h1></div>';
    html += '<nav>';
    [["overzicht", "Overzicht"], ["loggen", "Loggen"], ["geschiedenis", "Geschiedenis"], ["settings", ICON_GEAR]].forEach(function (t) {
      html += '<button class="tab-btn ' + (tab === t[0] ? "active" : "") + '" data-action="set-tab" data-tab="' + t[0] + '">' + t[1] + "</button>";
    });
    html += "</nav></div></header>";

    html += '<main class="wrap">' + renderCloudStatus();

    if (tab === "settings") html += renderSettings();
    else if (tab === "loggen") html += renderLoggen(exerciseNames);
    else if (tab === "geschiedenis") html += renderGeschiedenis(analytics);
    else html += renderOverzicht(analytics, exerciseNames);

    html += "</main>";
    document.getElementById("app").innerHTML = html;

    if (tab === "overzicht" && selectedExercise) {
      var cc = document.getElementById("chart-container");
      if (cc) cc.innerHTML = buildChartSVG(analytics.exerciseSeries[selectedExercise]);
    }
  }

  function renderSettings() {
    var html = '<div class="card"><h2 class="section-title">GitHub API Instellingen</h2>';
    html += '<div class="field"><label>GitHub Username</label><input type="text" id="cfg-user" value="' + esc(config.user) + '" placeholder="alek-durnez"></div>';
    html += '<div class="field"><label>Private Repository Naam</label><input type="text" id="cfg-repo" value="' + esc(config.repo) + '" placeholder="gym-data"></div>';
    html += '<div class="field"><label>Personal Access Token (PAT)</label><input type="password" id="cfg-token" value="' + esc(config.token) + '" placeholder="ghp_..."></div>';
    html += '<div style="display:flex; gap:10px; flex-wrap:wrap;">';
    html += '<button class="btn-primary" data-action="save-settings" style="margin-top:8px;">Instellingen Opslaan & Syncen</button>';
    html += '<button class="btn-danger" data-action="hard-wipe" style="margin-top:8px; background:#444;">Wipe Cache & Herstart</button>';
    html += '</div></div>';
    return html;
  }

  function renderLoggen(exerciseNames) {
    var routineNames = uniqueSorted(entries.map(function (e) { return e.routine; }));
    var html = '<form id="log-form" class="card" style="max-width:480px;"><h2 class="section-title">Sessie Loggen</h2>';
    html += '<div class="field"><label>Datum *</label><input type="date" name="date" value="' + esc(lastDate) + '"></div>';
    html += '<div class="field"><label>Routine *</label><input list="routines" name="routine" value="' + esc(lastRoutine) + '" placeholder="bv. Push"><datalist id="routines">';
    routineNames.forEach(function(r){ html += '<option value="'+esc(r)+'">'; });
    html += '</datalist></div>';
    html += '<div class="field"><label>Oefening *</label><input list="exercises" name="exercise" placeholder="bv. Lat Pulldown"><datalist id="exercises">';
    exerciseNames.forEach(function(e){ html += '<option value="'+esc(e)+'">'; });
    html += '</datalist></div>';
    html += '<div class="grid3">';
    html += '<div class="field"><label>Gewicht (kg) *</label><input type="number" step="0.5" name="weight"></div>';
    html += '<div class="field"><label>Sets *</label><input type="number" name="sets" value="3"></div>';
    html += '<div class="field"><label>Reps *</label><input type="number" name="reps" value="12"></div>';
    html += '</div>';
    html += '<div class="field"><label>Notities</label><textarea name="notes" rows="2" placeholder="Optioneel"></textarea></div>';
    html += '<div id="form-error" class="error-text" style="display:none;"></div>';
    html += '<button type="submit" class="btn-primary">Sessie Toevoegen</button></form>';
    return html;
  }

  function renderOverzicht(analytics, exerciseNames) {
    var html = "";
    var bestDate = null, latestPR = null;
    Object.keys(analytics.prKeys).forEach(function (k) {
      var d = k.split("|")[1]; if (!bestDate || d > bestDate) bestDate = d;
    });
    if (bestDate) {
      var candidates = entries.filter(function (e) { return e.date === bestDate && analytics.prKeys[e.exercise + "|" + e.date]; });
      if (candidates.length > 0) latestPR = candidates[0];
    }

    if (latestPR) {
      html += '<div class="card"><div class="flex between center-v">';
      html += '<div><div style="color:var(--brass);font-size:11px;font-weight:700;">' + ICON_TROPHY + ' LAATSTE RECORD</div>';
      html += '<h2 style="font-size:20px;margin:4px 0;">' + esc(latestPR.exercise) + '</h2>';
      html += '<p style="margin:0;font-size:12px;color:var(--steel);">' + latestPR.weight + ' kg op ' + esc(formatDateNL(latestPR.date)) + '</p></div>';
      html += '<div style="font-size:24px;font-weight:800;color:var(--brass);">' + latestPR.weight + ' <span style="font-size:12px;">KG</span></div>';
      html += '</div></div>';
    }

    html += '<div class="stat-grid">';
    var sessions = uniqueSorted(entries.map(function(e){return e.date;})).length;
    [["Sessies", sessions], ["Oefeningen", exerciseNames.length], ["Records", Object.keys(analytics.prKeys).length]].forEach(function (s) {
      html += '<div class="stat-card"><div class="stat-label">' + s[0] + '</div><div class="stat-value mono">' + s[1] + '</div></div>';
    });
    html += '</div>';

    html += '<div class="card"><div class="flex between center-v" style="margin-bottom:12px;"><h3 class="section-title" style="margin:0;">Progressie</h3>';
    if (exerciseNames.length > 0) {
      html += '<select id="exercise-select" style="width:auto;">';
      exerciseNames.forEach(function (ex) { html += '<option value="' + esc(ex) + '"' + (ex === selectedExercise ? " selected" : "") + ">" + esc(ex) + "</option>"; });
      html += '</select>';
    }
    html += '</div><div id="chart-container"></div></div>';
    return html;
  }

  function renderGeschiedenis(analytics) {
    var routineNames = uniqueSorted(entries.map(function (e) { return e.routine; }));
    var html = '<div class="card" style="margin-bottom:12px;"><div class="flex wrap-gap center-v">';
    html += '<select id="filter-routine" style="width:auto;"><option value="all">Alle routines</option>';
    routineNames.forEach(function (r) { html += '<option value="' + esc(r) + '"' + (r === filterRoutine ? " selected" : "") + ">" + esc(r) + "</option>"; });
    html += '</select>';
    html += '<div class="search-wrap">' + ICON_SEARCH + '<input id="search-input" placeholder="Zoek op oefening..." value="' + esc(search) + '"></div>';
    html += "</div></div>";

    var filtered = entries.filter(function (e) {
      if (filterRoutine !== "all" && e.routine !== filterRoutine) return false;
      if (search.trim() && e.exercise.toLowerCase().indexOf(search.trim().toLowerCase()) === -1) return false;
      return true;
    });

    var groups = {}; var order = [];
    filtered.forEach(function (e) {
      if (!groups[e.date]) { groups[e.date] = []; order.push(e.date); }
      groups[e.date].push(e);
    });
    order.sort().reverse();

    if (order.length === 0) html += '<div class="empty">Geen sessies gevonden.</div>';
    order.forEach(function (date) {
      var dayEntries = groups[date];
      html += '<div class="history-group"><div class="history-head"><span class="dot" style="background:' + routineColor(dayEntries[0].routine) + ';"></span>';
      html += '<span style="font-weight:600;">' + esc(formatDateNL(date)) + '</span><span style="font-size:12px;color:var(--steel);"> \u00b7 ' + esc(dayEntries[0].routine) + '</span></div>';
      dayEntries.forEach(function (entry) {
        var isPR = analytics.prKeys[entry.exercise + "|" + entry.date] && entry.weight === analytics.dailyMaxMap[entry.exercise + "|" + entry.date];
        html += '<div class="history-row"><div>';
        html += '<div class="flex center-v" style="gap:6px;"><span style="font-weight:500;">' + esc(entry.exercise) + '</span>';
        if (isPR) html += '<span class="pr-badge">PR</span>';
        html += '</div><div class="mono" style="font-size:13px;color:var(--steel);margin-top:2px;">' + entry.weight + ' kg \u00b7 ' + entry.sets + ' \u00d7 ' + entry.reps + '</div>';
        if (entry.notes) html += '<div class="notes">' + esc(entry.notes) + '</div>';
        html += '</div>';
        if (confirmDeleteId === entry.id) {
          html += '<div><button class="btn-danger" style="margin:0; padding:4px 8px; font-size:11px;" data-action="confirm-delete" data-id="' + entry.id + '">Ja</button> <button class="btn-secondary" data-action="cancel-delete">Nee</button></div>';
        } else {
          html += '<button class="icon-btn" data-action="ask-delete" data-id="' + entry.id + '">' + ICON_TRASH + '</button>';
        }
        html += '</div>';
      });
      html += '</div>';
    });
    return html;
  }

  // --- Handlers ---
  document.addEventListener("click", function (e) {
    var el = e.target.closest("[data-action]"); if (!el) return;
    var act = el.dataset.action;
    if (act === "set-tab") { tab = el.dataset.tab; render(); }
    else if (act === "save-settings") {
      config.user = document.getElementById("cfg-user").value.trim();
      config.repo = document.getElementById("cfg-repo").value.trim();
      config.token = document.getElementById("cfg-token").value.trim();
      saveConfig(); showToast("Instellingen bewaard!"); syncFromCloud();
    }
    else if (act === "hard-wipe") {
      if(confirm("Weet je zeker dat je alle lokale instellingen wilt wissen om een schone sync af te dwingen?")) {
        localStorage.clear();
        config = { user: "", repo: "", token: "" };
        entries = [];
        fileSha = null;
        cloudState = "unconfigured";
        cloudErrorLog = "";
        showToast("Cache geleegd. Vul je gegevens opnieuw in.");
        render();
      }
    }
    else if (act === "ask-delete") { confirmDeleteId = el.dataset.id; render(); }
    else if (act === "cancel-delete") { confirmDeleteId = null; render(); }
    else if (act === "confirm-delete") {
      var nextEntries = entries.filter(function(x){ return x.id !== el.dataset.id; });
      confirmDeleteId = null; pushToCloud(nextEntries); showToast("Sessie verwijderd");
    }
  });

  document.addEventListener("change", function(e) {
    if (e.target.id === "filter-routine") { filterRoutine = e.target.value; render(); }
    else if (e.target.id === "exercise-select") { selectedExercise = e.target.value; render(); }
  });
  document.addEventListener("input", function(e) {
    if (e.target.id === "search-input") { search = e.target.value; render(); }
  });

  document.addEventListener("submit", function (e) {
    if (e.target.id !== "log-form") return;
    e.preventDefault();
    var f = e.target;
    var date = f.elements["date"].value;
    var routine = f.elements["routine"].value.trim();
    var exercise = f.elements["exercise"].value.trim();
    var weight = parseFloat(f.elements["weight"].value);
    var sets = parseInt(f.elements["sets"].value, 10);
    var reps = parseInt(f.elements["reps"].value, 10);
    var notes = f.elements["notes"].value.trim();

    if (!date || !routine || !exercise || isNaN(weight) || isNaN(sets) || isNaN(reps)) {
      var err = document.getElementById("form-error"); err.textContent = "Vul alle velden in."; err.style.display="block"; return;
    }
    
    var newEntry = { id: "e-" + Date.now(), date: date, routine: routine, exercise: exercise, weight: weight, sets: sets, reps: reps, notes: notes };
    lastDate = date; lastRoutine = routine;
    
    var updated = [].concat(entries); updated.push(newEntry);
    pushToCloud(updated);
    showToast("Sessie toegevoegd!");
    tab = "overzicht";
    render();
  });

  // --- Start ---
  syncFromCloud();
})();
</script>
</body>
</html><!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KrachtLog</title>
<style>
  :root {  
    --graphite:#1A1A1C; --iron:#26262A; --border:#36363B;  
    --chalk:#EDEAE2; --steel:#9A9CA0; --rust:#C1440E; --brass:#C9A227;  
  }  
  * { box-sizing: border-box; }  
  body {  
    margin: 0; background: var(--graphite); color: var(--chalk);  
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;  
  }  
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }  
  .display { text-transform: uppercase; font-weight: 700; letter-spacing: 0.03em; }  
  .wrap { max-width: 880px; margin: 0 auto; padding: 0 16px; }  
  header { position: sticky; top: 0; z-index: 10; background: var(--graphite); border-bottom: 1px solid var(--border); }  
  .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 14px 0; }  
  .brand { display: flex; align-items: center; gap: 10px; }  
  .brand-icon { width: 26px; height: 26px; flex-shrink: 0; }  
  .brand h1 { font-size: 20px; margin: 0; }  
  nav { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }  
  .tab-btn {  
    padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 600;  
    border: 1px solid var(--border); background: transparent; color: var(--steel); cursor: pointer;  
  }  
  .tab-btn.active { background: var(--rust); border-color: var(--rust); color: var(--chalk); }  
  main { padding: 20px 0 60px; }  
  .card { background: var(--iron); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 18px; }  
  .flex { display: flex; }  
  .between { justify-content: space-between; }  
  .center-v { align-items: center; }  
  .wrap-gap { flex-wrap: wrap; gap: 12px; }  
  .stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 18px; }  
  @media (min-width: 640px) { .stat-grid { grid-template-columns: repeat(4,1fr); } }  
  .stat-card { background: var(--iron); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }  
  .stat-label { font-size: 11px; color: var(--steel); text-transform: uppercase; letter-spacing: 0.05em; }  
  .stat-value { font-size: 24px; font-weight: 600; margin-top: 4px; }  
  .section-title { font-size: 16px; font-weight: 600; margin: 0 0 12px; text-transform: uppercase; letter-spacing: 0.03em; }  
  input, select, textarea {  
    background: var(--graphite); border: 1px solid var(--border); border-radius: 6px;  
    padding: 8px 10px; color: var(--chalk); font-size: 14px; width: 100%; font-family: inherit;  
  }  
  input:focus, select:focus, textarea:focus, button:focus { outline: 2px solid var(--rust); outline-offset: 1px; }  
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }  
  .field-label { font-size: 11px; color: var(--steel); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }  
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }  
  .btn-primary {  
    background: var(--rust); color: var(--chalk); border: none; border-radius: 6px;  
    padding: 10px 16px; font-weight: 600; font-size: 14px; cursor: pointer;  
    display: inline-flex; align-items: center; gap: 6px;  
  }  
  .btn-secondary {  
    background: transparent; border: 1px solid var(--border); color: var(--steel);  
    border-radius: 6px; padding: 8px 12px; cursor: pointer; font-size: 13px;  
  }  
  .btn-link { background: none; border: none; color: var(--steel); text-decoration: underline; cursor: pointer; font-size: 12px; }  
  .btn-danger { background: var(--rust); color: var(--chalk); border: none; border-radius: 4px; padding: 4px 8px; font-size: 11px; cursor: pointer; }  
  .icon-btn { background: transparent; border: none; color: var(--steel); cursor: pointer; padding: 4px; flex-shrink: 0; }  
  .error-text { color: var(--rust); font-size: 13px; margin-bottom: 10px; }  
  .empty { color: var(--steel); font-size: 14px; padding: 20px; text-align: center; }  
  .history-group { background: var(--iron); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }  
  .history-head { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); }  
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }  
  .history-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }  
  .history-row:last-child { border-bottom: none; }  
  .pr-badge { font-size: 10px; font-weight: 700; color: var(--graphite); background: var(--brass); border-radius: 4px; padding: 1px 6px; letter-spacing: 0.04em; }  
  .notes { font-size: 12px; color: var(--steel); margin-top: 4px; font-style: italic; }  
  .plate-pr { display: flex; align-items: center; flex-shrink: 0; }  
  .plate-pr .bar { width: 20px; height: 6px; background: var(--steel); border-radius: 2px; }  
  .plate-pr .disc {  
    border-radius: 50%; display: flex; align-items: center; justify-content: center;  
    border: 3px solid var(--graphite); margin: 0 -2px; box-shadow: inset 0 0 0 4px rgba(0,0,0,0.18);  
  }  
  .cloud-bar { display: flex; align-items: center; gap: 8px; padding: 6px 12px; font-size: 12px; border-radius: 6px; margin-bottom: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }  
  .cloud-log { font-family: ui-monospace, monospace; font-size: 11px; background: #111; color: #ff8888; border: 1px solid var(--rust); padding: 8px; border-radius: 4px; margin-top: 8px; display: none; white-space: pre-wrap; word-break: break-all; }  
  .toast {  
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);  
    background: var(--iron); border: 1px solid var(--brass); padding: 10px 18px;  
    border-radius: 8px; font-size: 13px; z-index: 50;  
  }  
  .chart-svg { width: 100%; height: 240px; }  
  .search-wrap { position: relative; flex: 1; min-width: 160px; }  
  .search-wrap input { padding-left: 30px; }  
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--steel); }  
</style>
</head>
<body>
<div id="app"></div>

<script>
(function () {
  "use strict";

  var LOCAL_BACKUP_KEY = "krachtlog-local-fallback";
  var ROUTINE_COLORS = { "Push": "#C1440E", "Pull A": "#C9A227", "Pull B": "#5C7A8A", "Legs": "#6B7A4A" };
  var FALLBACK_PALETTE = ["#8B6F9E", "#9E6F6F", "#6F9E8B", "#9E9E6F"];

  function routineColor(r) {
    if (ROUTINE_COLORS[r]) return ROUTINE_COLORS[r];
    var hash = 0;
    for (var i = 0; i < r.length; i++) hash = (hash * 31 + r.charCodeAt(i)) % FALLBACK_PALETTE.length;
    return FALLBACK_PALETTE[Math.abs(hash) % FALLBACK_PALETTE.length];
  }

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  // --- State ---
  var config = { user: "", repo: "", token: "" };
  var entries = [];
  var fileSha = null;
  var cloudState = "unconfigured"; // 'unconfigured', 'loading', 'synced', 'error'
  var cloudErrorLog = "";
  var tab = "overzicht";
  
  var confirmDeleteId = null;
  var confirmWipe = false;
  var filterRoutine = "all";
  var search = "";
  var selectedExercise = "";
  
  var lastDate = todayISO();
  var lastRoutine = "";
  var toastMsg = "";
  var toastTimer = null;

  function todayISO() {
    var d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  // Load configuration from local storage
  try {
    var savedConfig = localStorage.getItem("krachtlog-config-v2");
    if (savedConfig) config = JSON.parse(savedConfig);
    var savedLocal = localStorage.getItem(LOCAL_BACKUP_KEY);
    if (savedLocal) entries = JSON.parse(savedLocal);
  } catch(e) {}

  function saveConfig() {
    try { localStorage.setItem("krachtlog-config-v2", JSON.stringify(config)); } catch(e) {}
  }
  function saveLocalFallback() {
    try { localStorage.setItem(LOCAL_BACKUP_KEY, JSON.stringify(entries)); } catch(e) {}
  }

  // --- GitHub API Sync engine ---
  async function apiRequest(method, body) {
    var url = "https://api.github.com/repos/" + config.user + "/" + config.repo + "/contents/gym-data.json";
    var headers = {
      "Authorization": "token " + config.token,
      "Accept": "application/vnd.github.v3+json",
      "Content-Type": "application/json"
    };
    var options = { method: method, headers: headers };
    if (body) options.body = JSON.stringify(body);
    return fetch(url, options);
  }

  async function syncFromCloud() {
    if (!config.user || !config.repo || !config.token) {
      cloudState = "unconfigured";
      render();
      return;
    }
    cloudState = "loading";
    cloudErrorLog = "";
    render();

    try {
      var res = await apiRequest("GET");
      if (res.status === 404) {
        // Create initial file if not found
        cloudErrorLog = "gym-data.json niet gevonden. Poging tot aanmaken...";
        var createRes = await apiRequest("PUT", {
          message: "Initialiseer logboek",
          content: btoa(JSON.stringify(entries, null, 2))
        });
        if (createRes.ok) {
          var data = await createRes.json();
          fileSha = data.content.sha;
          cloudState = "synced";
        } else {
          var errData = await createRes.json();
          throw new Error("Aanmaken mislukt: " + errData.message);
        }
      } else if (res.ok) {
        var data = await res.json();
        fileSha = data.sha;
        var rawContent = atob(data.content.replace(/\s/g, ''));
        entries = JSON.parse(rawContent);
        saveLocalFallback();
        cloudState = "synced";
      } else {
        var errData = await res.json();
        throw new Error("Server antwoordde met status " + res.status + ": " + errData.message);
      }
    } catch(err) {
      cloudState = "error";
      cloudErrorLog = err.message;
    }
    render();
  }

  async function pushToCloud(updatedEntries) {
    if (cloudState !== "synced" && cloudState !== "error") return;
    try {
      var body = {
        message: "Update logboek: " + todayISO(),
        content: btoa(JSON.stringify(updatedEntries, null, 2)),
        sha: fileSha
      };
      var res = await apiRequest("PUT", body);
      if (res.ok) {
        var data = await res.json();
        fileSha = data.content.sha;
        entries = updatedEntries;
        saveLocalFallback();
        cloudState = "synced";
        cloudErrorLog = "";
      } else {
        var errData = await res.json();
        throw new Error("Push mislukt: " + errData.message);
      }
    } catch (err) {
      cloudState = "error";
      cloudErrorLog = "Wijziging lokaal bewaard, maar cloud-push faalde: " + err.message;
      entries = updatedEntries;
      saveLocalFallback();
    }
    render();
  }

  // --- Analytics engine ---
  function computeAnalytics(list) {
    var byExercise = {};
    list.forEach(function (e) { (byExercise[e.exercise] = byExercise[e.exercise] || []).push(e); });
    var prKeys = {}; var dailyMaxMap = {}; var exerciseSeries = {};
    Object.keys(byExercise).forEach(function (ex) {
      var byDate = {};
      byExercise[ex].forEach(function (e) { byDate[e.date] = Math.max(byDate[e.date] || 0, e.weight); });
      var dates = Object.keys(byDate).sort();
      var runningMax = -Infinity; var series = [];
      dates.forEach(function (d, i) {
        var w = byDate[d];
        var isPR = i === 0 || w > runningMax;
        if (isPR) prKeys[ex + "|" + d] = true;
        dailyMaxMap[ex + "|" + d] = w;
        series.push({ date: d, weight: w, isPR: isPR });
        runningMax = Math.max(runningMax, w);
      });
      exerciseSeries[ex] = series;
    });
    return { prKeys: prKeys, dailyMaxMap: dailyMaxMap, exerciseSeries: exerciseSeries };
  }

  function formatDateNL(iso, opts) {
    if(!iso) return "";
    var d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("nl-NL", opts || { day: "numeric", month: "long", year: "numeric" });
  }
  function formatDateShort(iso) {
    var d = new Date(iso + "T00:00:00");
    return d.toLocaleDateString("nl-NL", { day: "numeric", month: "short" });
  }
  function uniqueSorted(arr) {
    var seen = {}; var out = [];
    arr.forEach(function (v) { if (!seen[v]) { seen[v] = true; out.push(v); } });
    return out.sort();
  }

  function showToast(msg) {
    toastMsg = msg;
    var el = document.getElementById("toast");
    if (el) { el.textContent = msg; el.style.display = "block"; }
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toastMsg = ""; var t = document.getElementById("toast"); if (t) t.style.display = "none";
    }, 2200);
  }

  // --- UI Templates ---
  var ICON_DUMBBELL = '<svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="#C1440E" stroke-width="2"><path d="M6.5 6.5 17.5 17.5M4 4l2.5 2.5M17.5 17.5 20 20"/><rect x="2" y="2" width="4" height="4" rx="1"/><rect x="18" y="18" width="4" height="4" rx="1"/></svg>';
  var ICON_GEAR = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';
  var ICON_TROPHY = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M7 5H4a3 3 0 0 0 3 4M17 5h3a3 3 0 0 1-3 4"/></svg>';
  var ICON_TRASH = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"/></svg>';
  var ICON_SEARCH = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9A9CA0" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>';

  function buildChartSVG(series) {
    if (!series || series.length === 0) return '<div class="empty">Geen progressiedata.</div>';
    var w = 600, h = 220, padL = 36, padR = 10, padT = 14, padB = 24;
    var weights = series.map(function (s) { return s.weight; });
    var minW = Math.min.apply(null, weights), maxW = Math.max.apply(null, weights);
    var range = (maxW - minW) || 1;
    var stepX = series.length > 1 ? (w - padL - padR) / (series.length - 1) : 0;
    function x(i) { return padL + i * stepX; }
    function y(val) { return h - padB - ((val - minW) / range) * (h - padT - padB); }
    var points = series.map(function (s, i) { return x(i) + "," + y(s.weight); }).join(" ");
    var dots = series.map(function (s, i) {
      return '<circle cx="' + x(i) + '" cy="' + y(s.weight) + '" r="' + (s.isPR ? 6 : 4) + '" fill="' + (s.isPR ? "#C9A227" : "#C1440E") + '" stroke="#1A1A1C" stroke-width="2"/>';
    }).join("");
    var showAll = series.length <= 6;
    var labels = series.map(function (s, i) {
      if (showAll || i === 0 || i === series.length - 1) {
        return '<text x="' + x(i) + '" y="' + (h - 6) + '" font-size="10" fill="#9A9CA0" text-anchor="middle">' + esc(formatDateShort(s.date)) + "</text>";
      }
      return "";
    }).join("");
    return '<svg viewBox="0 0 ' + w + " " + h + '" class="chart-svg">' +
      '<line x1="' + padL + '" y1="' + (h - padB) + '" x2="' + (w - padR) + '" y2="' + (h - padB) + '" stroke="#36363B" />' +
      '<polyline points="' + points + '" fill="none" stroke="#C1440E" stroke-width="2" />' +
      dots + labels + "</svg>";
  }

  function renderCloudStatus() {
    var color = "var(--steel)", txt = "Niet geconfigureerd";
    var displayLog = "none";
    if (cloudState === "loading") { color = "var(--brass)"; txt = "🔄 Laden uit GitHub..."; }
    else if (cloudState === "synced") { color = "#4A7A5C"; txt = "☁️ Gesynchroniseerd met GitHub"; }
    else if (cloudState === "error") { color = "var(--rust)"; txt = "⚠️ Verbindingsfout cloud"; displayLog = "block"; }

    var html = '<div class="cloud-bar"><span style="width:8px;height:8px;border-radius:50%;background:' + color + ';"></span><span>' + txt + '</span></div>';
    html += '<div class="cloud-log" style="display:' + displayLog + ';">' + esc(cloudErrorLog) + '</div>';
    return html;
  }

  function render() {
    var analytics = computeAnalytics(entries);
    var exerciseNames = uniqueSorted(entries.map(function (e) { return e.exercise; }));
    if (!selectedExercise || exerciseNames.indexOf(selectedExercise) === -1) selectedExercise = exerciseNames[0] || "";

    var html = '<div class="toast" id="toast" style="display:' + (toastMsg ? "block" : "none") + ';">' + esc(toastMsg) + "</div>";
    html += '<header><div class="wrap header-inner">';
    html += '<div class="brand">' + ICON_DUMBBELL + '<h1>KrachtLog</h1></div>';
    html += '<nav>';
    [["overzicht", "Overzicht"], ["loggen", "Loggen"], ["geschiedenis", "Geschiedenis"], ["settings", ICON_GEAR]].forEach(function (t) {
      html += '<button class="tab-btn ' + (tab === t[0] ? "active" : "") + '" data-action="set-tab" data-tab="' + t[0] + '">' + t[1] + "</button>";
    });
    html += "</nav></div></header>";

    html += '<main class="wrap">' + renderCloudStatus();

    if (tab === "settings") html += renderSettings();
    else if (tab === "loggen") html += renderLoggen(exerciseNames);
    else if (tab === "geschiedenis") html += renderGeschiedenis(analytics);
    else html += renderOverzicht(analytics, exerciseNames);

    html += "</main>";
    document.getElementById("app").innerHTML = html;

    if (tab === "overzicht" && selectedExercise) {
      var cc = document.getElementById("chart-container");
      if (cc) cc.innerHTML = buildChartSVG(analytics.exerciseSeries[selectedExercise]);
    }
  }

  function renderSettings() {
    var html = '<div class="card"><h2 class="section-title">GitHub API Instellingen</h2>';
    html += '<div class="field"><label>GitHub Username</label><input type="text" id="cfg-user" value="' + esc(config.user) + '" placeholder="alek-durnez"></div>';
    html += '<div class="field"><label>Private Repository Naam</label><input type="text" id="cfg-repo" value="' + esc(config.repo) + '" placeholder="gym-data"></div>';
    html += '<div class="field"><label>Personal Access Token (PAT)</label><input type="password" id="cfg-token" value="' + esc(config.token) + '" placeholder="ghp_..."></div>';
    html += '<button class="btn-primary" data-action="save-settings" style="margin-top:8px;">Instellingen Opslaan & Syncen</button></div>';
    return html;
  }

  function renderLoggen(exerciseNames) {
    var routineNames = uniqueSorted(entries.map(function (e) { return e.routine; }));
    var html = '<form id="log-form" class="card" style="max-width:480px;"><h2 class="section-title">Sessie Loggen</h2>';
    html += '<div class="field"><label>Datum *</label><input type="date" name="date" value="' + esc(lastDate) + '"></div>';
    html += '<div class="field"><label>Routine *</label><input list="routines" name="routine" value="' + esc(lastRoutine) + '" placeholder="bv. Push"><datalist id="routines">';
    routineNames.forEach(function(r){ html += '<option value="'+esc(r)+'">'; });
    html += '</datalist></div>';
    html += '<div class="field"><label>Oefening *</label><input list="exercises" name="exercise" placeholder="bv. Lat Pulldown"><datalist id="exercises">';
    exerciseNames.forEach(function(e){ html += '<option value="'+esc(e)+'">'; });
    html += '</datalist></div>';
    html += '<div class="grid3">';
    html += '<div class="field"><label>Gewicht (kg) *</label><input type="number" step="0.5" name="weight"></div>';
    html += '<div class="field"><label>Sets *</label><input type="number" name="sets" value="3"></div>';
    html += '<div class="field"><label>Reps *</label><input type="number" name="reps" value="12"></div>';
    html += '</div>';
    html += '<div class="field"><label>Notities</label><textarea name="notes" rows="2" placeholder="Optioneel"></textarea></div>';
    html += '<div id="form-error" class="error-text" style="display:none;"></div>';
    html += '<button type="submit" class="btn-primary">Sessie Toevoegen</button></form>';
    return html;
  }

  function renderOverzicht(analytics, exerciseNames) {
    var html = "";
    // Zoek meest recente PR
    var bestDate = null, latestPR = null;
    Object.keys(analytics.prKeys).forEach(function (k) {
      var d = k.split("|")[1]; if (!bestDate || d > bestDate) bestDate = d;
    });
    if (bestDate) {
      var candidates = entries.filter(function (e) { return e.date === bestDate && analytics.prKeys[e.exercise + "|" + e.date]; });
      if (candidates.length > 0) latestPR = candidates[0];
    }

    if (latestPR) {
      html += '<div class="card"><div class="flex between center-v">';
      html += '<div><div style="color:var(--brass);font-size:11px;font-weight:700;">' + ICON_TROPHY + ' LAATSTE RECORD</div>';
      html += '<h2 style="font-size:20px;margin:4px 0;">' + esc(latestPR.exercise) + '</h2>';
      html += '<p style="margin:0;font-size:12px;color:var(--steel);">' + latestPR.weight + ' kg op ' + esc(formatDateNL(latestPR.date)) + '</p></div>';
      html += '<div style="font-size:24px;font-weight:800;color:var(--brass);">' + latestPR.weight + ' <span style="font-size:12px;">KG</span></div>';
      html += '</div></div>';
    }

    html += '<div class="stat-grid">';
    var sessions = uniqueSorted(entries.map(function(e){return e.date;})).length;
    [["Sessies", sessions], ["Oefeningen", exerciseNames.length], ["Records", Object.keys(analytics.prKeys).length]].forEach(function (s) {
      html += '<div class="stat-card"><div class="stat-label">' + s[0] + '</div><div class="stat-value mono">' + s[1] + '</div></div>';
    });
    html += '</div>';

    html += '<div class="card"><div class="flex between center-v" style="margin-bottom:12px;"><h3 class="section-title" style="margin:0;">Progressie</h3>';
    if (exerciseNames.length > 0) {
      html += '<select id="exercise-select" style="width:auto;">';
      exerciseNames.forEach(function (ex) { html += '<option value="' + esc(ex) + '"' + (ex === selectedExercise ? " selected" : "") + ">" + esc(ex) + "</option>"; });
      html += '</select>';
    }
    html += '</div><div id="chart-container"></div></div>';
    return html;
  }

  function renderGeschiedenis(analytics) {
    var routineNames = uniqueSorted(entries.map(function (e) { return e.routine; }));
    var html = '<div class="card" style="margin-bottom:12px;"><div class="flex wrap-gap center-v">';
    html += '<select id="filter-routine" style="width:auto;"><option value="all">Alle routines</option>';
    routineNames.forEach(function (r) { html += '<option value="' + esc(r) + '"' + (r === filterRoutine ? " selected" : "") + ">" + esc(r) + "</option>"; });
    html += '</select>';
    html += '<div class="search-wrap">' + ICON_SEARCH + '<input id="search-input" placeholder="Zoek op oefening..." value="' + esc(search) + '"></div>';
    html += "</div></div>";

    var filtered = entries.filter(function (e) {
      if (filterRoutine !== "all" && e.routine !== filterRoutine) return false;
      if (search.trim() && e.exercise.toLowerCase().indexOf(search.trim().toLowerCase()) === -1) return false;
      return true;
    });

    var groups = {}; var order = [];
    filtered.forEach(function (e) {
      if (!groups[e.date]) { groups[e.date] = []; order.push(e.date); }
      groups[e.date].push(e);
    });
    order.sort().reverse();

    if (order.length === 0) html += '<div class="empty">Geen sessies gevonden.</div>';
    order.forEach(function (date) {
      var dayEntries = groups[date];
      html += '<div class="history-group"><div class="history-head"><span class="dot" style="background:' + routineColor(dayEntries[0].routine) + ';"></span>';
      html += '<span style="font-weight:600;">' + esc(formatDateNL(date)) + '</span><span style="font-size:12px;color:var(--steel);"> \u00b7 ' + esc(dayEntries[0].routine) + '</span></div>';
      dayEntries.forEach(function (entry) {
        var isPR = analytics.prKeys[entry.exercise + "|" + entry.date] && entry.weight === analytics.dailyMaxMap[entry.exercise + "|" + entry.date];
        html += '<div class="history-row"><div>';
        html += '<div class="flex center-v" style="gap:6px;"><span style="font-weight:500;">' + esc(entry.exercise) + '</span>';
        if (isPR) html += '<span class="pr-badge">PR</span>';
        html += '</div><div class="mono" style="font-size:13px;color:var(--steel);margin-top:2px;">' + entry.weight + ' kg \u00b7 ' + entry.sets + ' \u00d7 ' + entry.reps + '</div>';
        if (entry.notes) html += '<div class="notes">' + esc(entry.notes) + '</div>';
        html += '</div>';
        if (confirmDeleteId === entry.id) {
          html += '<div><button class="btn-danger" data-action="confirm-delete" data-id="' + entry.id + '">Ja</button> <button class="btn-secondary" data-action="cancel-delete">Nee</button></div>';
        } else {
          html += '<button class="icon-btn" data-action="ask-delete" data-id="' + entry.id + '">' + ICON_TRASH + '</button>';
        }
        html += '</div>';
      });
      html += '</div>';
    });
    return html;
  }

  // --- Handlers ---
  document.addEventListener("click", function (e) {
    var el = e.target.closest("[data-action]"); if (!el) return;
    var act = el.dataset.action;
    if (act === "set-tab") { tab = el.dataset.tab; render(); }
    else if (act === "save-settings") {
      config.user = document.getElementById("cfg-user").value.trim();
      config.repo = document.getElementById("cfg-repo").value.trim();
      config.token = document.getElementById("cfg-token").value.trim();
      saveConfig(); showToast("Instellingen bewaard!"); syncFromCloud();
    }
    else if (act === "ask-delete") { confirmDeleteId = el.dataset.id; render(); }
    else if (act === "cancel-delete") { confirmDeleteId = null; render(); }
    else if (act === "confirm-delete") {
      var nextEntries = entries.filter(function(x){ return x.id !== el.dataset.id; });
      confirmDeleteId = null; pushToCloud(nextEntries); showToast("Sessie verwijderd");
    }
  });

  document.addEventListener("change", function(e) {
    if (e.target.id === "filter-routine") { filterRoutine = e.target.value; render(); }
    else if (e.target.id === "exercise-select") { selectedExercise = e.target.value; render(); }
  });
  document.addEventListener("input", function(e) {
    if (e.target.id === "search-input") { search = e.target.value; render(); }
  });

  document.addEventListener("submit", function (e) {
    if (e.target.id !== "log-form") return;
    e.preventDefault();
    var f = e.target;
    var date = f.elements["date"].value;
    var routine = f.elements["routine"].value.trim();
    var exercise = f.elements["exercise"].value.trim();
    var weight = parseFloat(f.elements["weight"].value);
    var sets = parseInt(f.elements["sets"].value, 10);
    var reps = parseInt(f.elements["reps"].value, 10);
    var notes = f.elements["notes"].value.trim();

    if (!date || !routine || !exercise || isNaN(weight) || isNaN(sets) || isNaN(reps)) {
      var err = document.getElementById("form-error"); err.textContent = "Vul alle velden in."; err.style.display="block"; return;
    }
    
    var newEntry = { id: "e-" + Date.now(), date: date, routine: routine, exercise: exercise, weight: weight, sets: sets, reps: reps, notes: notes };
    lastDate = date; lastRoutine = routine;
    
    var updated = [].concat(entries); updated.push(newEntry);
    pushToCloud(updated);
    showToast("Sessie toegevoegd!");
    tab = "overzicht";
    render();
  });

  // --- Initialiseer ---
  syncFromCloud();
})();
</script>
</body>
</html>
